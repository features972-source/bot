  - type: web
    name: credo-telegram-bot
    runtime: docker
    plan: starter
    healthCheckPath: /health
    autoDeployTrigger: commit
    dockerCommand: python bot_credo.py
    disk:
      name: credo-bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: CLOUD_DEPLOYED
        value: "true"
      - key: CREDO_ONLY_MODE
        value: "true"
      - key: DATABASE_PATH
        value: /data/links-credo.db
      - key: WEBHOOK_HOST
        value: 0.0.0.0
      - key: BOT_DISPLAY_NAME
        value: Credo Bot
      - key: BOT_INSTANCE_ID
        value: credo
      - key: STATS_TIMEZONE
        value: Europe/London
      - key: READY_CHECK_ENABLED
        value: "false"
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: ADMIN_CHAT_ID
        sync: false
