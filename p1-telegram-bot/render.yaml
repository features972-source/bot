# Standalone blueprint — deploy ONLY the P1 Press-1 bot (not Q1/Q2/Credo).
# In Render: New -> Blueprint -> connect this repo, or New -> Web Service with Root Directory = p1-telegram-bot
#
# After deploy set in dashboard:
#   BOT_TOKEN, TELEGRAM_ALLOWED_IDS, VICIDIAL_SSH_KEY

services:
  - type: web
    name: p1-telegram-bot
    runtime: docker
    plan: starter
    rootDir: p1-telegram-bot
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - p1-telegram-bot/**
    envVars:
      - key: CLOUD_DEPLOYED
        value: "true"
      - key: TELEGRAM_WEBHOOK_URL
        value: https://p1-bot.onrender.com/telegram/webhook
      - key: WEBHOOK_HOST
        value: 0.0.0.0
      - key: VICIDIAL_SSH_HOST
        value: 206.189.118.204
      - key: VICIDIAL_SSH_USER
        value: root
      - key: VICIDIAL_CAMPAIGN
        value: press1
      - key: VICIDIAL_LIST_ID
        value: "101"
      - key: VICIDIAL_SOUND_NAME
        value: press1_alice
      - key: VICIDIAL_SERVER_IP
        value: 206.189.118.204
      - key: VICIDIAL_MAX_CONCURRENT
        value: "0"
      - key: VICIDIAL_DIALER_CAP
        value: "0"
      - key: VICIDIAL_BATCH_SIZE
        value: "100"
      - key: VICIDIAL_CALL_GAP_SEC
        value: "0.1"
      - key: VICIDIAL_BATCH_PAUSE_SEC
        value: "0"
      - key: VICIDIAL_CPS
        value: "20"
      - key: VICIDIAL_CALLER_ID
        value: "442038968062"
      - key: VICIDIAL_AU_CALLER_ID
        value: "442038968062"
      - key: VICIDIAL_NZ_CALLER_ID
        value: "442038968062"
      - key: PRESS1_DEFAULT_PHONE_CODE
        value: "64"
      - key: VICIDIAL_TEST_NUMBERS
        value: 447769799593
      - key: PRESS1_OWNER_TEST_NUMBER
        value: 447769799593
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_IDS
        sync: false
      - key: VICIDIAL_SSH_KEY
        sync: false
      - key: BITCALL_SIP_USER
        value: f-features896
      - key: BITCALL_SIP_PASSWORD
        sync: false
      - key: BITCALL_SIP_REALM
        value: gateway.bitcall.io
      - key: DASH_API_SECRET
        sync: false
      - key: DASH_SUBSCRIPTION_KEYS
        sync: false
